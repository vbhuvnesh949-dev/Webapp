<!DOCTYPE html>
<html>
<head>
  <title>JEE Student App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📚 JEE Student Tool</h1>

<div class="container">

  <!-- Calculator -->
  <div class="card">
    <h2>🧮 Calculator</h2>
    <input type="text" id="calc" placeholder="2+2">
    <button onclick="calculate()">Calculate</button>
    <p id="result"></p>
  </div>

  <!-- Notes -->
  <div class="card">
    <h2>📝 Notes</h2>
    <textarea id="notes"></textarea>
    <button onclick="saveNotes()">Save</button>
  </div>

  <!-- Timer -->
  <div class="card">
    <h2>⏱ Timer</h2>
    <p id="time">0</p>
    <button onclick="startTimer()">Start</button>
  </div>

  <!-- Formula -->
  <div class="card">
    <h2>📘 Formulas</h2>
    <p>Speed = Distance / Time</p>
    <p>a² + b² = c²</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
